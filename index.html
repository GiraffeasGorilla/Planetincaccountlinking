<!DOCTYPE html>
<html>
<head>
    <title>Verify Link</title>
    <!-- Load Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Verifying Link...</h1>
    <div id="status">Checking...</div>

    <script>
        // ⚠️ CONFIGURATION
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
        const META_APP_ID = "YOUR_META_APP_ID";
        const ORG_NAME = "myStitch14"; // Your Org Name

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 1. Get the URL parameter (the Meta Access Token passed from Unity or Login)
        const urlParams = new URLSearchParams(window.location.search);
        const accessToken = urlParams.get('token');

        if (!accessToken) {
            document.getElementById('status').innerText = "No token found.";
        }

        // 2. Ask Meta for the User ID
        fetch(`https://graph.facebook.com/v19.0/me?fields=id&access_token=${accessToken}`)
            .then(res => res.json())
            .then(metaData => {
                const userId = metaData.id;
                console.log("User ID:", userId);

                // 3. (Optional) Check if user is actually in your Org `myStitch14`
                // NOTE: Meta API for "Org Membership" is restricted. 
                // If you are just checking if they logged in with YOUR app, we assume they are.
                // If you need to check a specific Business Org, you need Business Access Tokens.
                // For now, we assume if they logged in with YOUR app, they are "linked".

                // 4. Save/Verify in Supabase
                // We insert the user ID and mark them as verified
                const { data, error } = supabase
                    .from('linked_users')
                    .upsert({ user_meta_id: userId, is_verified: true }, { onConflict: 'user_meta_id' })
                    .select();

                if (error) {
                    console.error("DB Error:", error);
                    document.getElementById('status').innerText = "Error verifying.";
                } else {
                    document.getElementById('status').innerHTML = `
                        <h3>✅ Success!</h3>
                        <p>Your Meta ID (${userId}) is now linked to ` + ORG_NAME + `.</p>
                        <p><strong>Return to the game to claim your reward.</strong></p>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('status').innerText = "Error connecting to Meta.";
            });
    </script>
</body>
</html>
