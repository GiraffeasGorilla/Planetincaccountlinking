<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Accounts</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 { margin-top: 0; color: #333; }
    p { color: #666; margin-bottom: 25px; }
    
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    
    .btn-meta { background: #0084ff; color: white; }
    .btn-meta:hover { background: #006bcf; }
    
    .btn-discord { background: #5865F2; color: white; }
    .btn-discord:hover { background: #4752c4; }
    
    .btn-success { background: #2e7d32; color: white; cursor: default; }
    .btn-success:hover { transform: none; background: #2e7d32; }

    .hidden { display: none; }
    .status { margin-top: 15px; font-weight: bold; }
    .meta-status { color: #0084ff; }
    .discord-status { color: #5865F2; }
    
    #loading { font-size: 18px; color: #555; }
  </style>
</head>
<body>

<div class="container">
  <div id="step-meta">
    <h1>🔗 Link Accounts</h1>
    <p>Connect your Meta account first to unlock features.</p>
    <a id="meta-btn" class="btn btn-meta" href="#">Link with Meta</a>
  </div>

  <div id="step-discord" class="hidden">
    <h1>🎮 Link Discord</h1>
    <p>Meta connected! Now connect your Discord.</p>
    <a id="discord-btn" class="btn btn-discord" href="#">Link with Discord</a>
  </div>

  <div id="success" class="hidden">
    <h1>🎉 All Linked!</h1>
    <p>Your accounts are successfully connected.</p>
    <div id="user-info" style="margin: 20px 0; font-size: 14px; color: #444;"></div>
    <button class="btn btn-success" onclick="window.close()">Close & Return to Site</button>
  </div>

  <div id="error" class="hidden">
    <h1>⚠️ Error</h1>
    <p id="error-msg" style="color: #d32f2f;"></p>
    <button class="btn btn-meta" onclick="location.reload()">Try Again</button>
  </div>
</div>

<script>
  // CONFIGURATION
  const META_ORG_ID = "311136358617844";
  // The URL of THIS page (GitHub Pages)
  const BASE_URL = window.location.origin + window.location.pathname;
  
  const META_REDIRECT_URI = BASE_URL; 
  const DISCORD_CLIENT_ID = "1499535933119397999"; // REPLACE THIS
  const DISCORD_REDIRECT_URI = BASE_URL;

  let currentMetaId = null;

  window.onload = function() {
    const hash = window.location.hash.substring(1);
    const search = window.location.search.substring(1);

    console.log("Hash:", hash);
    console.log("Search:", search);

    // 1. Check for Meta Data (Hash)
    if (hash && hash.length > 10) {
      processMetaLink(hash);
      return;
    }

    // 2. Check for Discord Code (Query Param or Hash)
    if (search.includes('code=') || hash.includes('code=')) {
      processDiscordLink(search || hash);
      return;
    }

    // 3. Default: Show Meta Button
    document.getElementById('meta-btn').href = `https://auth.oculus.com/sso/?redirect_uri=${encodeURIComponent(META_REDIRECT_URI)}&organization_id=${META_ORG_ID}`;
  };

  function showStep(step) {
    document.getElementById('step-meta').classList.add('hidden');
    document.getElementById('step-discord').classList.add('hidden');
    document.getElementById('success').classList.add('hidden');
    document.getElementById('error').classList.add('hidden');

    if (step === 'meta') document.getElementById('step-meta').classList.remove('hidden');
    if (step === 'discord') document.getElementById('step-discord').classList.remove('hidden');
    if (step === 'success') document.getElementById('success').classList.remove('hidden');
    if (step === 'error') document.getElementById('error').classList.remove('hidden');
  }

  function processMetaLink(hash) {
    try {
      const json = atob(hash);
      const data = JSON.parse(json);
      currentMetaId = data['org-scoped_id'] || data.user_id;

      if (!currentMetaId) throw new Error("No ID found");

      showStep('discord');
      // Update Discord button URL if needed, or just keep it static

    } catch (err) {
      console.error(err);
      document.getElementById('error-msg').textContent = "Meta Link Failed: " + err.message;
      showStep('error');
    }
  }

  function processDiscordLink(paramString) {
    try {
      // Extract code from ?code=... or #code=...
      let code = null;
      if (paramString.includes('?')) {
        const params = new URLSearchParams(paramString);
        code = params.get('code');
      } else {
        const params = new URLSearchParams(paramString.replace('#', ''));
        code = params.get('code');
      }

      if (!code) throw new Error("No code received");

      // Simulate success (In real app, send 'code' to backend)
      document.getElementById('user-info').innerHTML = 
        `<strong>Meta:</strong> ${currentMetaId}<br><strong>Discord:</strong> Linked`;
      
      showStep('success');
      
      // Optional: Clean URL
      window.history.replaceState({}, document.title, BASE_URL);

    } catch (err) {
      console.error(err);
      document.getElementById('error-msg').textContent = "Discord Link Failed: " + err.message;
      showStep('error');
    }
  }
</script>

</body>
</html>
